name: dev_sweeper
description: A desktop application to free up space used by developer tools.
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: ^3.9.0
  flutter: ^3.35.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter 
  intl:
  desktop_file_system: 
    path: packages/desktop_file_system
  cupertino_icons:
  macos_ui:
  yaru:
  path:
  path_provider:
  freezed_annotation:
  collection:
  flutter_riverpod:
  riverpod_annotation:
  window_size:
  flutter_svg:
  uuid:
  proper_filesize:
  process:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:
  arb_generator:
  build_runner:
  freezed:
  riverpod_generator:
  riverpod_lint:
  custom_lint:
  app_store_screenshots:
    git:
      url: https://github.com/defuncart/app_store_screenshots
  flutter_launcher_icons:

dependency_overrides:
  yaru:
    git:
      url: https://github.com/gev/yaru.dart
      ref: main

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/logos/

arb_generator:
  input_filepath: "assets_dev/loca/loca.csv"
  output_directory: "assets_dev/l10n"
  filename_prepend: ""
  csv_settings:
    delimiter: ";"
    base_index: 1

flutter_launcher_icons:
  macos:
    generate: true
    image_path: "assets_dev/app_icons/app_icon_macos.png"
